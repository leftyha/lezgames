services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lezgamez
      POSTGRES_PASSWORD: lezgamez
      POSTGRES_DB: lezgamez
    ports:
      - "5432:5432"
    volumes:
      - lezgamez_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - lezgamez_redis_data:/data

volumes:
  lezgamez_postgres_data:
  lezgamez_redis_data:
